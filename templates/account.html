<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        (function () {
            if (!location.port) return;
            if (location.port === "5000") return;
            if (location.hostname !== "127.0.0.1" && location.hostname !== "localhost") return;
            location.replace(location.protocol + "//" + location.hostname + ":5000/account");
        })();
    </script>
</head>
<body>
    <div class="md-scaffold">
        <header class="md-top-app-bar" role="banner">
            <div class="md-top-app-bar__toolbar">
                <span class="material-symbols-outlined md-top-app-bar__leading" aria-hidden="true">account_circle</span>
                <div class="md-top-app-bar__titles">
                    <h1 class="md-top-app-bar__headline">Conta</h1>
                    <p class="md-top-app-bar__sub">Atualize dados ou apague sua conta</p>
                </div>
                <div class="md-top-app-bar__actions" aria-label="Ações">
                    <a class="md-top-app-bar__action-link" href="/">Voltar</a>
                    <a class="md-top-app-bar__action-link" href="/logout">Sair</a>
                </div>
            </div>
        </header>

        <main class="md-main" role="main">
            <section class="md-card md-card--elevated md-auth-card" aria-label="Gerenciar conta">
                <div class="md-card__header">
                    <span class="material-symbols-outlined md-card__icon" aria-hidden="true">settings</span>
                    <h2 class="md-card__title">Gerenciar conta</h2>
                </div>

                {% if error %}
                    <p class="md-auth-error">{{ error }}</p>
                {% endif %}

                <form class="md-auth-form" method="post" action="/account">
                    <input type="hidden" name="_action" value="update" />

                    <div class="md-text-field md-text-field--filled">
                        <label class="md-text-field__label" for="username">Usuário</label>
                        <input id="username" name="username" type="text" value="{{ username }}" autocomplete="username">
                    </div>

                    <div class="md-text-field md-text-field--filled">
                        <label class="md-text-field__label" for="password">Nova senha (opcional)</label>
                        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Deixe em branco para não alterar">
                    </div>

                    <div class="md-auth-actions">
                        <button type="submit" class="md-filled-button">
                            <span class="material-symbols-outlined" aria-hidden="true">save</span>
                            <span class="md-filled-button__label">Salvar</span>
                        </button>
                    </div>
                </form>

                <div style="height: 10px;"></div>

                <form class="md-auth-form" method="post" action="/account" onsubmit="return confirm('Apagar conta permanentemente?');">
                    <input type="hidden" name="_action" value="delete" />

                    <div class="md-text-field md-text-field--filled">
                        <label class="md-text-field__label" for="passwordDelete">Senha para confirmar</label>
                        <input id="passwordDelete" name="password" type="password" autocomplete="current-password" placeholder="Sua senha">
                    </div>

                    <div class="md-auth-actions">
                        <button type="submit" class="md-filled-button" style="background: #8c1d18;">
                            <span class="material-symbols-outlined" aria-hidden="true">delete</span>
                            <span class="md-filled-button__label">Apagar conta</span>
                        </button>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
