<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrar — V.O Tradutor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/auth.css?v=20260703">
    <script>
        (function () {
            if (!location.port) return;
            if (location.port === "5000") return;
            if (location.hostname !== "127.0.0.1" && location.hostname !== "localhost") return;
            location.replace(location.protocol + "//" + location.hostname + ":5000/login");
        })();
    </script>
</head>
<body class="md-auth-shell">
    <header class="md-auth-top" role="banner">
        <a class="md-auth-back" href="/">
            <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
            Voltar ao site
        </a>
    </header>

    <main class="md-auth-main" role="main">
        <section class="md-auth-card" aria-label="Entrar">
            <header class="md-auth-card__head">
                <div class="md-auth-card__icon-wrap" aria-hidden="true">
                    <span class="material-symbols-outlined">login</span>
                </div>
                <h1 class="md-auth-card__title">Entrar</h1>
                <p class="md-auth-card__subtitle">Acesse sua conta do V.O Tradutor</p>
            </header>

            <form class="md-auth-form" method="post" action="/login" novalidate>
                <div class="md-auth-field">
                    <label class="md-auth-field__label" for="username">Usuário</label>
                    <div class="md-auth-field__box">
                        <span class="material-symbols-outlined md-auth-field__leading" aria-hidden="true">person</span>
                        <input id="username" name="username" type="text" autocomplete="username" placeholder="Seu usuário" value="{{ username or '' }}" required>
                    </div>
                </div>

                <div class="md-auth-field">
                    <label class="md-auth-field__label" for="password">Senha</label>
                    <div class="md-auth-field__box">
                        <span class="material-symbols-outlined md-auth-field__leading" aria-hidden="true">lock</span>
                        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Sua senha" required>
                        <button type="button" class="md-auth-field__toggle" data-toggle-password="password" aria-label="Mostrar senha">
                            <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                        </button>
                    </div>
                </div>

                <div class="md-auth-row">
                    <label class="md-auth-checkbox">
                        <input type="checkbox" name="remember_me">
                        <span class="md-auth-checkbox__box" aria-hidden="true"></span>
                        <span>Lembrar-me</span>
                    </label>
                </div>

                {% if error %}
                    <div class="md-auth-banner md-auth-banner--error" role="alert">
                        <span class="material-symbols-outlined" aria-hidden="true">error</span>
                        <span>{{ error }}</span>
                    </div>
                {% endif %}

                <button type="submit" class="md-auth-submit">
                    <span class="material-symbols-outlined" aria-hidden="true">login</span>
                    Entrar
                </button>
            </form>

            <footer class="md-auth-card__foot">
                <p>Não tem conta? <a class="md-auth-link" href="/register">Criar cadastro</a></p>
            </footer>
        </section>
    </main>

    <script src="/static/js/auth.js"></script>
</body>
</html>
