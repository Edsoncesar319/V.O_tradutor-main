<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        (function () {
            if (!location.port) return;
            if (location.port === "5000") return;
            if (location.hostname !== "127.0.0.1" && location.hostname !== "localhost") return;
            location.replace(location.protocol + "//" + location.hostname + ":5000/register");
        })();
    </script>
</head>
<body>
    <div class="md-scaffold">
        <header class="md-top-app-bar" role="banner">
            <div class="md-top-app-bar__toolbar">
                <span class="material-symbols-outlined md-top-app-bar__leading" aria-hidden="true">person_add</span>
                <div class="md-top-app-bar__titles">
                    <h1 class="md-top-app-bar__headline">Voice AI Chat</h1>
                    <p class="md-top-app-bar__sub">Crie sua conta para usar o app</p>
                </div>
            </div>
        </header>

        <main class="md-main" role="main">
            <section class="md-card md-card--elevated md-auth-card" aria-label="Registro">
                <div class="md-card__header">
                    <span class="material-symbols-outlined md-card__icon" aria-hidden="true">person_add</span>
                    <h2 class="md-card__title">Criar conta</h2>
                </div>

                <form class="md-auth-form" method="post" action="/register">
                    <div class="md-text-field md-text-field--filled">
                        <label class="md-text-field__label" for="username">Usuário</label>
                        <input id="username" name="username" type="text" autocomplete="username" placeholder="Escolha um usuário">
                    </div>

                    <div class="md-text-field md-text-field--filled">
                        <label class="md-text-field__label" for="password">Senha</label>
                        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Mínimo de 6 caracteres">
                    </div>

                    {% if error %}
                        <p class="md-auth-error">{{ error }}</p>
                    {% endif %}

                    <div class="md-auth-actions">
                        <button type="submit" class="md-filled-button">
                            <span class="material-symbols-outlined" aria-hidden="true">done</span>
                            <span class="md-filled-button__label">Criar</span>
                        </button>
                    </div>

                    <p class="md-hint" style="margin-top: 2px;">
                        Já tem conta? <a class="md-auth-link" href="/login">Entrar</a>
                    </p>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
